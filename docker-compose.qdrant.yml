version: '3.5'

services:
  qdrant:
    container_name: qdrant
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  qdrant:
    driver: bridge

volumes:
  qdrant-data:
